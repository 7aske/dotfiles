# Debian/Ubuntu optional dependencies for dotfiles scripts and configs.
# Format: package|command|description[|gui]
#   gui  — only suggested on hosts with a graphical session (see check-apt-deps.sh)
#
# Commands provided by this repo (src/*.sh, src/statusbar/*) are excluded automatically.

# --- i3 / X11 desktop ---
i3|i3-msg|i3 IPC (wtoggle2, i3wss, statusbar)|gui
jq|jq|JSON parsing (wtoggle2, i3wss, klipper status)
xdotool|xdotool|X11 window automation (wtoggle2, padefault, movetodisplay)|gui
x11-utils|xprop|X11 window properties (wtoggle2, movetodisplay)|gui
x11-xserver-utils|xrandr|Monitor layout (wtoggle2, screencam, screenlayout)|gui
libnotify-bin|notify-send|Desktop notifications (many scripts, statusbar)|gui
wmctrl|wmctrl|Window manager control (movetodisplay)|gui
x11-utils|xdpyinfo|Display geometry (movetodisplay)|gui
x11-utils|xwininfo|Window geometry (movetodisplay)|gui
scrot|scrot|Screenshot for lock.sh|gui
imagemagick|convert|Image manipulation (lock.sh, blurlock.sh)
i3lock|i3lock|Screen locker (lock.sh)|gui
playerctl|playerctl|Media player control (i3 config, music statusbar, lock.sh)
pavucontrol|pavucontrol|PulseAudio/PipeWire volume GUI (i3, statusbar)|gui
pulseaudio-utils|pactl|Audio control (padefault, volume statusbar)
xclip|xclip|Clipboard (google-search, ranger, config/rc)|gui
xsel|xsel|Selection clipboard (ranger)|gui
x11-xkb-utils|setxkbmap|Keyboard layout (kblang, layout statusbar)|gui
xdo|xdo|X11 automation (zsh .zshrc)|gui

# --- menus / search ---
fzf|fzf|Fuzzy finder (rfv, codeopen, vimcfg, pacsel, fzf-agent)
ripgrep|rg|Fast search (rfv, fzf-rg, wolsel)
dmenu|dmenu|Dmenu launcher (pacsel, google-search, i3wss)|gui
rofi|rofi|Rofi launcher (vimcfg, screenlayout, statusbar-config, wolsel)|gui
bat|batcat|Syntax-highlighted file preview (rfv, vimcfg)
fd-find|fdfind|Fast file finder (config/rc FZF_DEFAULT_COMMAND; symlink as fd)

# --- shell / dev tools ---
git|git|Version control (vimcfg, codeopen, gitwatch)
tmux|tmux|Terminal multiplexer (fzf-agent)
curl|curl|HTTP client (owm-weather, klipper statusbar)
lazygit|lazygit|Terminal git UI (codeopen)
openssh-client|ssh|Remote shell (wolsel)
neovim|nvim|Editor (profile, config/rc)
ranger|ranger|Terminal file manager (profile TERMFILE)

# --- statusbar ---
bluez|bluetoothctl|Bluetooth control (bluetooth statusbar)
blueman|blueman-manager|Bluetooth GUI (bluetooth statusbar)|gui
lm-sensors|sensors|Hardware temperature (temp statusbar)
solaar|solaar|Logitech Unifying receiver (mx statusbar)|gui
acpi|acpi|Battery info (battery statusbar)
smem|smem|Memory usage report (memory statusbar)
dunst|dunstctl|Notification daemon control (packages statusbar)|gui
zenity|zenity|GTK dialogs (packages statusbar)|gui
i3status|i3status|i3 status bar fallback (config uses i3status-rs on Arch)|gui
htop|htop|Process viewer (i3 config, memory/cpu statusbar)

# --- task / productivity ---
taskwarrior|task|Taskwarrior CLI (tasksync, task-open)
taskwarrior-tui|taskwarrior-tui|Taskwarrior TUI (i3, notify-tasks)|gui
calcurse|calcurse|Calendar TUI (i3, clock statusbar)
newsboat|newsboat|RSS reader (newsboat statusbar)

# --- media / wallpaper ---
sxiv|sxiv|Image viewer (setwal)|gui
ffmpeg|ffmpeg|Video/audio (screencam, ranger scope, ffcat)
yt-dlp|yt-dlp|Video downloader (ytdl)

# --- kubernetes ---
kubectl|kubectl|Kubernetes CLI (kubepf, kubemetrics)
netcat-openbsd|nc|Port checks (kubepf)

# --- misc scripts ---
xdg-utils|xdg-open|Open URLs and files (task-open, google-search)|gui
yad|yad|GTK dialogs (colorpick)|gui
kitty|kitty|Terminal emulator (i3 config)|gui
net-tools|netstat|Network status (services statusbar)
