# Arch optional dependencies for dotfiles scripts and configs.
# Format: package|command|description[|gui]
#   gui  — only suggested on hosts with a graphical session (see check-arch-deps.sh)
# Prefix package with "aur/" for AUR-only packages (install via yay when available).
#
# Commands provided by this repo (src/*.sh, src/statusbar/*) are excluded automatically.

# --- i3 / X11 desktop ---
extra/i3-wm|i3-msg|i3 IPC (wtoggle2, i3wss, statusbar)|gui
extra/jq|jq|JSON parsing (wtoggle2, i3wss, klipper status)
extra/xdotool|xdotool|X11 window automation (wtoggle2, padefault, movetodisplay)|gui
extra/xorg-xprop|xprop|X11 window properties (wtoggle2, movetodisplay)|gui
extra/xorg-xrandr|xrandr|Monitor layout (wtoggle2, screencam, screenlayout)|gui
extra/libnotify|notify-send|Desktop notifications (many scripts, statusbar)|gui
extra/wmctrl|wmctrl|Window manager control (movetodisplay)|gui
extra/xorg-xdpyinfo|xdpyinfo|Display geometry (movetodisplay)|gui
extra/xorg-xwininfo|xwininfo|Window geometry (movetodisplay)|gui
extra/scrot|scrot|Screenshot for lock.sh|gui
extra/imagemagick|convert|Image manipulation (lock.sh, blurlock.sh)
extra/i3lock|i3lock|Screen locker (lock.sh)|gui
extra/playerctl|playerctl|Media player control (i3 config, music statusbar, lock.sh)
extra/pavucontrol|pavucontrol|PulseAudio/PipeWire volume GUI (i3, statusbar)|gui
extra/pipewire-pulse|pactl|Audio control (padefault, volume statusbar)
extra/xclip|xclip|Clipboard (google-search, ranger, config/rc)|gui
extra/xsel|xsel|Selection clipboard (ranger)|gui
extra/xorg-setxkbmap|setxkbmap|Keyboard layout (kblang, layout statusbar)|gui
extra/xdo|xdo|X11 automation (zsh .zshrc)|gui

